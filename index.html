const LSK='wb_dash_pw';
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function decrypt(pw){
 const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
 const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(ENC.salt),iterations:ENC.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(ENC.iv)},key,b64d(ENC.ct));
 return new TextDecoder().decode(pt);
}
function reveal(h){document.open();document.write(h);document.close();}
async function go(pw,save){const h=await decrypt(pw);if(save){try{localStorage.setItem(LSK,pw);}catch(e){}}reveal(h);}
async function tryAuto(){let pw=null;try{pw=localStorage.getItem(LSK);}catch(e){}if(!pw)return false;try{await go(pw,false);return true;}catch(e){return false;}}
async function submit(){const pw=document.getElementById('pw').value;document.getElementById('er').textContent='Проверяю…';
 try{await go(pw,true);}catch(e){document.getElementById('er').textContent='Неверный пароль';}}
(async()=>{ if(await tryAuto())return;
  const l=document.getElementById('lock'); l.style.display='flex';
  document.getElementById('go').onclick=submit;
  const p=document.getElementById('pw'); p.focus();
  p.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
})();
</script></body></html>
